<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>노벨 바이블 — 작가를 위한 세계관 기록 도우미</title>
    <meta
      name="description"
      content="원고와 설정을 차곡차곡 저장하면, AI가 인물·사건·설정을 기억해 두었다가 새 에피소드를 쓸 때 도와주고 놓친 부분을 검사해 주는 작가용 서비스"
    />

    <!-- 두 목소리: Pretendard(도구 UI) · Nanum Myeongjo(작가의 글) · JetBrains Mono(숫자/회차) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
  </head>
  <body class="bg-paper">
    <!--
      Netlify Forms 감지용 정적 폼.
      배포 시 Netlify가 이 마크업을 읽어 'waitlist' 폼을 등록한다.
      실제 입력은 React 랜딩 폼이 이 폼 이름으로 제출한다.
    -->
    <form name="waitlist" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="role" />
      <input type="text" name="genre" />
      <input type="text" name="interests" />
      <input type="text" name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
